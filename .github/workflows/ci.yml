name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# v1 has no release/publish job — registry publishing is deferred post-1.0.

jobs:
  lint:
    name: Lint and typecheck (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libhidapi-libusb0 libudev1 libusb-1.0-0
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libhidapi-libusb0 libudev1 libusb-1.0-0
      - run: pip install -e ".[dev]"
      - run: pytest -v --cov=deckbridge --cov-report=term-missing

  web:
    name: Web (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - run: npm run check
      - run: npm run build
